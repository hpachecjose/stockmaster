version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: stockmaster-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-stockmaster}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stockmaster}
      POSTGRES_DB: ${DB_NAME:-stockmaster_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/migrations
      - ./database/seeds:/seeds
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-stockmaster} -d ${DB_NAME:-stockmaster_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stockmaster-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-stockmaster_redis}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-stockmaster_redis}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-stockmaster_redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
    container_name: stockmaster-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-stockmaster}
      - DB_PASSWORD=${DB_PASSWORD:-stockmaster}
      - DB_NAME=${DB_NAME:-stockmaster_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-stockmaster_redis}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
    container_name: stockmaster-web
    restart: always
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - api

  cobol-runner:
    build:
      context: ./core
    container_name: stockmaster-cobol
    volumes:
      - ./core:/app/core
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
